[package]
name = "fugu"
version = "0.1.0"
edition = "2021"

[dependencies]
async-stream = "0.3.6"
aws-config = { version = "1.1.7", features = ["behavior-version-latest"] }
aws-sdk-s3 = "1.82.0"
chrono = { version = "0.4.40", features = ["rkyv"] }
clap = { version = "*", features = ["cargo", "derive"] }
daemonize = "0.5.0"
pretty_assertions = "1.4.1"
prost = "0.13.5"
rand = { version = "0.9", features = ["std"] }
rkyv = "0.8.10"
rkyv_dyn = "0.7.44"
rust-s3 = "0.35"
serde = "1.0.219"
serde_json = "1.0.140"
sled = { version = "*" }
tantivy = { version = "0.22.0" }
tempfile = "3.19.1"
tokio = { version = "1.44.1", features = ["full"] }
tokio-stream = "0.1.17"
tonic = "0.13.0"
tracing = { version = "0.1.41", features = ["log"] }
tracing-subscriber = { version = "0.3.19", features = ["json"] }
bm25 = "2.2.1"

[build-dependencies]
tonic-build = "*"

[features]
# Define test categories
default = []
integration-tests = []
performance-tests = []

# Test organization
[[test]]
name = "grpc_tests"
path = "tests/grpc_tests.rs"
required-features = ["integration-tests"]
